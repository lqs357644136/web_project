<!DOCTYPE html><html><head><meta name=viewport content="width=device-width,user-scalable=no"><meta http-equiv=Content-Type content="text/html; charset=UTF-8"><title>Intelfor</title><meta name=Keywords content=Intelfor><meta name=Description content=Intelfor><meta name=renderer content=webkit><meta http-equiv=X-UA-Compatible content="IE=Edge,chrome=1"><link rel="shortcut icon" href=./favicon.ico><link href=./app.675b5a82823219c178b41c586301d639.css rel=stylesheet></head><body><mainbody></mainbody><script type=text/javascript src=./static/js/d95db84a.js></script><script type=text/javascript src=./static/js/9b2593db.js></script><script type=text/javascript src=./static/js/c312414a.js></script></body><script>//解决 IOS10 缩放
  window.onload = function () {
    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    })
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      var now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false)
  }</script></html>
